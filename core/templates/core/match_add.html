{% extends 'core/base.html' %}
{% block content %}
<div style="max-width:500px;margin:auto">
  <div class="card">
    <h2>Add a match</h2>
    <p class="meta" style="margin-bottom:1rem">Room: {{ room.name }}</p>
    <form method="post">
      {% csrf_token %}
      {% for field in form %}
        <div style="margin-bottom:1rem">
          <label>{{ field.label }}</label>
          {{ field }}
          {% if field.help_text %}
            <p class="meta">{{ field.help_text }}</p>
          {% endif %}
          {% if field.errors %}
            <p style="color:red;font-size:0.8rem">{{ field.errors.0 }}</p>
          {% endif %}
        </div>
      {% endfor %}
      <div class="flex" style="margin-top:0.5rem">
        <button type="submit" class="btn btn-primary">Add match</button>
        <a href="{% url 'admin_dashboard' room.pk %}" class="btn btn-outline">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
