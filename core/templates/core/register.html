{% extends 'core/base.html' %}
{% block content %}
<div style="max-width:440px;margin:3rem auto">
  <div style="text-align:center;margin-bottom:2rem">
    <h1 style="font-size:2.5rem">Athl<span style="color:var(--green)">et</span>IQ</h1>
    <p class="meta">Create your account and start predicting</p>
  </div>
  <div class="card card-solid">
    <form method="post">
      {% csrf_token %}
      {% for field in form %}
      <div style="margin-bottom:0.25rem">
        <label>{{ field.label }}</label>
        {{ field }}
        {% if field.errors %}
          <p style="color:var(--red);font-size:0.8rem;margin-top:-0.75rem;margin-bottom:0.75rem">{{ field.errors.0 }}</p>
        {% endif %}
      </div>
      {% endfor %}
      <button type="submit" class="btn btn-primary btn-block" style="margin-top:0.5rem">Create account</button>
    </form>
    <p style="text-align:center;margin-top:1.25rem;font-size:0.85rem;color:var(--muted)">
      Already a member? <a href="{% url 'login' %}" style="color:var(--green);text-decoration:none;font-weight:600">Sign in</a>
    </p>
  </div>
</div>
{% endblock %}
