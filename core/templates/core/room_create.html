{% extends 'core/base.html' %}
{% block content %}
<div style="max-width:520px;margin:0 auto">
  <p class="section-label">New</p>
  <h2 style="margin-bottom:1.5rem">Create a room</h2>
  <div class="card card-solid">
    <form method="post">
      {% csrf_token %}
      {% for field in form %}
      <div style="margin-bottom:0.25rem">
        <label>{{ field.label }}</label>
        {{ field }}
        {% if field.errors %}
          <p style="color:var(--red);font-size:0.8rem;margin-top:-0.75rem;margin-bottom:0.75rem">{{ field.errors.0 }}</p>
        {% endif %}
      </div>
      {% endfor %}
      <div class="flex" style="margin-top:0.5rem">
        <button type="submit" class="btn btn-primary">Create room</button>
        <a href="{% url 'rooms_list' %}" class="btn btn-outline">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
